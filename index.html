<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Отчетность склада</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--text:#172033;--muted:#667085;--line:#d9dee7;--blue:#1f4e78;--blue2:#e8eef5;--shadow:0 10px 24px rgba(16,24,40,.08);--radius:18px}
*{box-sizing:border-box}html,body{max-width:100%;overflow-x:hidden}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:20;background:#172033;color:#fff;padding:14px 18px;box-shadow:0 4px 18px rgba(0,0,0,.14)}
.topbar{max-width:1700px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
h1{font-size:20px;margin:0}.status{font-size:13px;color:#d0d5dd}.date-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:8px 12px;border-radius:999px;font-weight:800}
main{max-width:1700px;margin:18px auto 40px;padding:0 14px}.page{display:none}.page.active{display:block}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
button,.btn{border:0;border-radius:12px;padding:10px 14px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:40px;font-size:15px}
button.light,.btn.light{background:#fff;color:var(--text);border:1px solid var(--line)}button.danger{background:#b42318}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}.flow-block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.flow-head{background:#172033;color:#fff;padding:14px 16px;font-weight:900;font-size:18px;display:flex;justify-content:space-between;gap:10px;align-items:center}.flow-sub{color:#d0d5dd;font-size:12px;font-weight:700}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px}.mini-block{border:1px solid var(--line);border-radius:16px;background:#fbfcfe;overflow:hidden}.mini-head{padding:12px;background:var(--blue2);font-weight:900;display:flex;justify-content:space-between;gap:8px;align-items:center}.mini-head small{color:var(--muted);font-weight:800}
.metric-list{padding:8px}.metric-row{display:grid;grid-template-columns:minmax(150px,1fr) 110px 34px;gap:8px;align-items:center;border-bottom:1px solid var(--line);padding:8px 4px}.metric-row:last-child{border-bottom:0}
.metric-name{font-weight:850;color:var(--text);text-decoration:none;border-bottom:2px solid transparent;line-height:1.2}.metric-name:hover{border-bottom-color:var(--blue)}
.metric-input{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 8px;text-align:center;background:#fff;font-size:16px;font-weight:850}
.metric-input:focus{outline:2px solid rgba(31,78,120,.25);border-color:#1f4e78}.icon-delete{width:30px;height:30px;min-height:30px;padding:0;border-radius:999px;background:#fff;color:#b42318;border:1px solid #f0b8b2;font-size:18px}
.mini-foot{padding:10px 12px;background:#fff;display:flex;justify-content:space-between;gap:8px;align-items:center;color:var(--muted);font-size:13px;font-weight:800}
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin:12px 0;overflow:hidden}.panel h2,.panel h3{margin:0 0 12px}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 0;align-items:end}.filter{display:flex;flex-direction:column;gap:4px;color:var(--muted);font-size:13px;font-weight:800}input[type=date],select{border:1px solid var(--line);border-radius:10px;padding:9px 10px;background:#fff;color:var(--text);font-weight:700}
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:12px;margin:14px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px}.stat .label{color:var(--muted);font-size:13px;margin-bottom:8px}.stat .value{font-size:28px;font-weight:900}
.chart-wrap{position:relative;overflow:hidden}.chart-scroll{width:100%;max-width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;position:relative}.chart-scroll canvas{display:block}canvas{width:100%;height:320px;border:1px solid var(--line);border-radius:14px;background:#fff}
.chart-tooltip{position:absolute;display:none;background:#172033;color:white;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700;box-shadow:0 10px 24px rgba(0,0,0,.22);pointer-events:none;z-index:5;min-width:170px}.chart-tooltip .muted{color:#d0d5dd;font-weight:600}.chart-tooltip.show{display:block}
.table-scroll{width:100%;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px}.table-scroll table{min-width:760px}table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{border-bottom:1px solid var(--line);padding:8px 7px;text-align:left;font-size:14px}th{background:#f8fafc;color:#344054;font-size:12px;text-transform:uppercase}
.badge{border-radius:999px;padding:7px 10px;font-size:13px;font-weight:800;border:1px solid var(--line);display:inline-flex}
.toast{position:fixed;left:50%;top:84px;transform:translateX(-50%);background:#172033;color:#fff;padding:14px 18px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:9999;font-weight:800;max-width:92%;text-align:center;display:none}.toast.show{display:block}
.modal-backdrop{position:fixed;inset:0;background:rgba(23,32,51,.58);display:none;align-items:center;justify-content:center;z-index:10000;padding:16px}.modal-backdrop.show{display:flex}.modal{background:#fff;border-radius:20px;box-shadow:0 24px 70px rgba(0,0,0,.28);width:100%;max-width:420px;padding:20px;border:1px solid var(--line)}
.modal h3{margin:0 0 8px}.modal p{margin:0 0 14px;color:var(--muted);font-size:14px}.modal input{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin:6px 0 10px;font-weight:800;font-size:15px}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
@media(max-width:1200px){.layout{grid-template-columns:1fr}.mini-grid{grid-template-columns:1fr 1fr}}
@media(max-width:760px){main{padding:0 8px;margin-top:10px}header{position:static;padding:12px 10px}h1{font-size:17px}.status{width:100%;font-size:12px}.date-pill{font-size:13px}.actions{gap:8px}.btn,button{font-size:14px;padding:9px 11px}.mini-grid,.stats-grid{grid-template-columns:1fr}.metric-row{grid-template-columns:minmax(130px,1fr) 96px 32px;gap:6px}.metric-input{font-size:15px;padding:8px 6px}.flow-head{font-size:16px}.panel{padding:12px}.chart-scroll canvas{height:260px;min-width:760px}.filters{align-items:stretch}.filter{width:100%}input[type=date],select{width:100%}.table-scroll table{min-width:780px}}
</style>
</head>
<body>
<header><div class="topbar"><h1>Отчетность склада</h1><div class="status" id="syncStatus">Локальный макет</div><div class="date-pill" id="todayLabel">Дата</div></div></header>
<div id="toast" class="toast"></div>
<main>
<section id="inputPage" class="page active"><div class="actions"><a class="btn" href="#history">История</a><button class="danger" id="clearTodayBtn">Очистить сегодняшний день</button><button class="light" id="exportCsvBtn">Скачать CSV</button></div><div class="layout" id="blocksRoot"></div></section>
<section id="metricPage" class="page"><div class="actions"><a class="btn light" href="#">← Назад к вводу</a><a class="btn light" href="#history">История</a></div><div id="metricAnalytics"></div></section>
<section id="historyPage" class="page"><div class="actions"><a class="btn light" href="#">← Назад к вводу</a><button class="danger" id="fullResetBtn">Очистка общей истории</button></div><div id="historyBlock"></div></section>
</main>
<div class="modal-backdrop" id="authModal"><div class="modal"><h3>Подтверждение доступа</h3><p>Введите логин и пароль для выполнения действия.</p><input id="authLogin" placeholder="Логин" inputmode="numeric" autocomplete="off"><input id="authPassword" placeholder="Пароль" inputmode="numeric" autocomplete="off" type="password"><div class="modal-actions"><button class="light" id="authCancel">Отмена</button><button id="authConfirm">Подтвердить</button></div></div></div>
<script>
const AUTH_LOGIN="156783",AUTH_PASSWORD="156783",STORAGE_KEY="warehouse_report_site_mockup_v1";
const STRUCTURE=[{id:"outgoing",title:"Исходящий поток",subtitle:"Сборка, сортировка и упаковка",minis:[{id:"assembly_sorting",title:"Сборка/сортировка",metrics:[{id:"assembly_done",name:"Собрано, шт"},{id:"sorting_done",name:"Отсортировано, шт"},{id:"assembly_errors",name:"Ошибки сборки, шт"}]},{id:"packing",title:"Упаковка",metrics:[{id:"packed_total",name:"Упаковано, шт"},{id:"packing_rework",name:"Возврат на перепаковку, шт"},{id:"packing_staff",name:"Упаковщиц, чел"}]}]},{id:"incoming",title:"Входящий поток",subtitle:"Приемка, раскладка и инвентаризация",minis:[{id:"receiving_putaway",title:"Приемка/раскладка",metrics:[{id:"received_pallets",name:"Принято паллет"},{id:"putaway_pallets",name:"Разложено паллет"},{id:"receiving_staff",name:"Сотрудников, чел"}]},{id:"inventory",title:"Инвентаризация",metrics:[{id:"inventory_checked",name:"Проверено ячеек"},{id:"inventory_mismatch",name:"Расхождения, шт"},{id:"inventory_staff",name:"Инвентаризаторов, чел"}]}]}];
function pad(n){return String(n).padStart(2,"0")}function todayKey(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function niceDate(k){const[y,m,d]=k.split("-");return `${d}.${m}.${y}`}function isoDaysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function dateDiffDays(f,t){if(!f||!t)return 0;return Math.floor((new Date(t+"T00:00:00")-new Date(f+"T00:00:00"))/86400000)+1}function validPeriod(f,t){const days=dateDiffDays(f,t);return Boolean(f&&t&&f<=t&&days>=7&&days<=62)}function defaultFrom(){return isoDaysAgo(29)}function defaultTo(){return todayKey()}function showInfo(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.classList.remove("show"),3200)}
function metricMap(){const map={};STRUCTURE.forEach(b=>b.minis.forEach(m=>m.metrics.forEach(x=>map[x.id]={...x,mini:m.title,block:b.title})));return map}const METRICS=metricMap();
function loadData(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return{}}}function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}function ensureDay(data,date){data[date] ||= {}}function cleanup62(data){const min=isoDaysAgo(61);Object.keys(data).forEach(d=>{if(d<min)delete data[d]})}function getValue(date,id){return loadData()[date]?.[id]??""}function setValue(date,id,value){const data=loadData();ensureDay(data,date);cleanup62(data);if(value===""||Number.isNaN(Number(value)))delete data[date][id];else data[date][id]=Number(value);saveData(data)}function deleteValue(date,id){const data=loadData();if(data[date])delete data[date][id];saveData(data)}
function allRows(from=isoDaysAgo(61),to=todayKey(),metricId=null){const data=loadData(),rows=[];Object.keys(data).sort().forEach(date=>{if(date<from||date>to)return;Object.keys(data[date]).forEach(id=>{if(metricId&&id!==metricId)return;const meta=METRICS[id];if(!meta)return;rows.push({date,id,name:meta.name,mini:meta.mini,block:meta.block,value:Number(data[date][id])})})});return rows}
function renderInput(){const date=todayKey();document.getElementById("todayLabel").textContent=`Сегодня: ${niceDate(date)}`;const root=document.getElementById("blocksRoot");root.innerHTML="";STRUCTURE.forEach(block=>{const flow=document.createElement("article");flow.className="flow-block";flow.innerHTML=`<div class="flow-head"><div>${block.title}</div><div class="flow-sub">${block.subtitle}</div></div><div class="mini-grid"></div>`;const grid=flow.querySelector(".mini-grid");block.minis.forEach(mini=>{const box=document.createElement("section");box.className="mini-block";box.innerHTML=`<div class="mini-head"><span>${mini.title}</span><small>${mini.metrics.length} показателя</small></div><div class="metric-list"></div><div class="mini-foot"><span>Данные за сегодня</span><span>${niceDate(date)}</span></div>`;const list=box.querySelector(".metric-list");mini.metrics.forEach(metric=>{const val=getValue(date,metric.id);const row=document.createElement("div");row.className="metric-row";row.innerHTML=`<a class="metric-name" href="#metric/${metric.id}">${metric.name}</a><input class="metric-input" inputmode="numeric" value="${val}" placeholder="0" data-metric="${metric.id}"><button class="icon-delete" data-delete="${metric.id}" title="Удалить значение">×</button>`;list.appendChild(row)});grid.appendChild(box)});root.appendChild(flow)});bindInputs()}
function bindInputs(){document.querySelectorAll(".metric-input").forEach(inp=>{inp.oninput=e=>{e.target.value=String(e.target.value).replace(/[^\d.]/g,"")};inp.onblur=e=>{setValue(todayKey(),e.target.dataset.metric,e.target.value);showInfo("Значение сохранено")};inp.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();e.target.blur()}}});document.querySelectorAll("[data-delete]").forEach(btn=>{btn.onclick=e=>{const id=e.currentTarget.dataset.delete;if(!confirm("Удалить введенное значение за сегодня?"))return;deleteValue(todayKey(),id);renderInput();showInfo("Значение удалено")}})}
function statsFor(rows){const c=rows.length,t=rows.reduce((s,r)=>s+r.value,0),a=c?t/c:0,mx=c?Math.max(...rows.map(r=>r.value)):0;return{count:c,total:t,avg:a,max:mx}}function dailySeries(rows){const map={};rows.forEach(r=>{map[r.date] ||= [];map[r.date].push(r.value)});return Object.keys(map).sort().map(date=>({date,value:map[date].reduce((s,x)=>s+x,0),count:map[date].length}))}
function periodControls(p,f,t){return `<div class="filters"><label class="filter">С даты<input type="date" id="${p}From" min="${isoDaysAgo(61)}" max="${todayKey()}" value="${f}"></label><label class="filter">По дату<input type="date" id="${p}To" min="${isoDaysAgo(61)}" max="${todayKey()}" value="${t}"></label><button class="light" id="${p}Apply">Показать</button></div>`}function bindPeriod(p,cb){document.getElementById(`${p}Apply`).onclick=()=>{const f=document.getElementById(`${p}From`).value,t=document.getElementById(`${p}To`).value;if(!validPeriod(f,t)){showInfo("Выберите период более 7 дней, но не более 62 дней");return}cb(f,t)}}
function statCards(s){return `<div class="stats-grid"><div class="stat"><div class="label">Дней с данными</div><div class="value">${s.count}</div></div><div class="stat"><div class="label">Сумма</div><div class="value">${Math.round(s.total)}</div></div><div class="stat"><div class="label">Среднее</div><div class="value">${Math.round(s.avg)}</div></div><div class="stat"><div class="label">Максимум</div><div class="value">${Math.round(s.max)}</div></div></div>`}
function drawLineChart(canvas,points,title){const ctx=canvas.getContext("2d"),ratio=devicePixelRatio||1;canvas.width=canvas.clientWidth*ratio;canvas.height=canvas.clientHeight*ratio;ctx.scale(ratio,ratio);const W=canvas.clientWidth,H=canvas.clientHeight;ctx.clearRect(0,0,W,H);ctx.font="14px system-ui";ctx.fillStyle="#172033";ctx.fillText(title,18,26);const tooltip=canvas.parentElement.querySelector(".chart-tooltip");canvas.__points=[];if(!points.length){ctx.fillStyle="#98a2b3";ctx.font="22px system-ui";ctx.fillText("Нет данных для графика",54,120);return}const pL=54,pR=18,pT=44,pB=54,pW=W-pL-pR,pH=H-pT-pB,maxY=Math.max(10,Math.ceil(Math.max(...points.map(p=>p.value))/10)*10);ctx.strokeStyle="#d9dee7";ctx.lineWidth=1;ctx.font="12px system-ui";for(let i=0;i<=4;i++){let y=pT+pH/4*i;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();ctx.fillStyle="#667085";ctx.fillText(String(Math.round(maxY-(maxY/4)*i)),14,y+4)}const xFor=i=>points.length===1?pL+pW/2:pL+(pW/(points.length-1))*i,yFor=v=>pT+pH-(v/maxY)*pH;ctx.strokeStyle="#1f4e78";ctx.lineWidth=3;ctx.beginPath();points.forEach((p,i)=>{const x=xFor(i),y=yFor(p.value);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle="#1f4e78";points.forEach((p,i)=>{const x=xFor(i),y=yFor(p.value);canvas.__points.push({x,y,...p});ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()});ctx.fillStyle="#667085";ctx.font="11px system-ui";const step=Math.max(1,Math.ceil(points.length/8));points.forEach((p,i)=>{if(i%step===0||i===points.length-1){const x=xFor(i);ctx.save();ctx.translate(x,H-18);ctx.rotate(-0.35);ctx.fillText(niceDate(p.date).slice(0,5),-13,0);ctx.restore()}});const showTip=e=>{if(!tooltip)return;const rect=canvas.getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;const mx=cx-rect.left,my=cy-rect.top;let near=null,best=99999;canvas.__points.forEach(p=>{const d=Math.hypot(mx-p.x,my-p.y);if(d<best){best=d;near=p}});if(!near||best>22){tooltip.classList.remove("show");return}tooltip.innerHTML=`<div>${niceDate(near.date)}</div><div class="muted">Значение: ${near.value}</div>`;tooltip.style.left=Math.min(Math.max(near.x+12,8),rect.width-190)+"px";tooltip.style.top=Math.max(near.y-64,8)+"px";tooltip.classList.add("show")};canvas.onmousemove=showTip;canvas.ontouchstart=showTip;canvas.ontouchmove=showTip;canvas.onmouseleave=()=>tooltip&&tooltip.classList.remove("show");canvas.ontouchend=()=>setTimeout(()=>tooltip&&tooltip.classList.remove("show"),1300)}
function renderMetric(id,f=defaultFrom(),t=defaultTo()){const meta=METRICS[id],rows=allRows(f,t,id),s=statsFor(rows),series=dailySeries(rows);document.getElementById("metricAnalytics").innerHTML=`<div class="panel"><h2>${meta.name}</h2><div class="badge">${meta.block} / ${meta.mini}</div>${periodControls("metricPeriod",f,t)}${statCards(s)}</div><div class="panel chart-wrap"><div class="chart-scroll"><canvas id="metricChart"></canvas><div class="chart-tooltip"></div></div></div><div class="panel"><h3>История показателя</h3>${historyTable(rows)}</div>`;bindPeriod("metricPeriod",(a,b)=>renderMetric(id,a,b));drawLineChart(document.getElementById("metricChart"),series,`Динамика: ${meta.name}`)}
function historyTable(rows){return `<div class="table-scroll"><table><thead><tr><th>Дата</th><th>Блок</th><th>Миниблок</th><th>Показатель</th><th>Значение</th></tr></thead><tbody>${rows.slice().reverse().map(r=>`<tr><td>${niceDate(r.date)}</td><td>${r.block}</td><td>${r.mini}</td><td>${r.name}</td><td><b>${r.value}</b></td></tr>`).join("")||`<tr><td colspan="5">Нет данных</td></tr>`}</tbody></table></div>`}
function renderHistory(f=defaultFrom(),t=defaultTo()){const rows=allRows(f,t);document.getElementById("historyBlock").innerHTML=`<div class="panel"><h2>История отчетности</h2>${periodControls("historyPeriod",f,t)}${historyTable(rows)}</div>`;bindPeriod("historyPeriod",(a,b)=>renderHistory(a,b))}
function exportCSV(){const rows=allRows(isoDaysAgo(61),todayKey());const head=["Дата","Блок","Миниблок","Показатель","Значение"];const esc=v=>`"${String(v??"").replace(/"/g,'""')}"`;const lines=[head.map(esc).join(";")];rows.forEach(r=>lines.push([niceDate(r.date),r.block,r.mini,r.name,r.value].map(esc).join(";")));const blob=new Blob(["﻿"+lines.join("
")],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`warehouse-report-${todayKey()}.csv`;a.click();URL.revokeObjectURL(a.href)}
function openAuth(){return new Promise(resolve=>{const modal=document.getElementById("authModal"),login=document.getElementById("authLogin"),pass=document.getElementById("authPassword");login.value="";pass.value="";modal.classList.add("show");login.focus();const close=v=>{modal.classList.remove("show");resolve(v)};document.getElementById("authCancel").onclick=()=>close(false);document.getElementById("authConfirm").onclick=()=>{if(login.value===AUTH_LOGIN&&pass.value===AUTH_PASSWORD)close(true);else{modal.classList.remove("show");showInfo("Вы не имеете прав очищать историю");resolve(false)}}})}
async function clearToday(){const ok=await openAuth();if(!ok)return;if(!confirm("Очистить все данные за сегодняшний день?"))return;const data=loadData();delete data[todayKey()];saveData(data);renderInput();showInfo("Сегодняшний день очищен")}
async function fullReset(){const ok=await openAuth();if(!ok)return;if(!confirm("Удалить всю историю за все время?"))return;saveData({});renderHistory();showInfo("История полностью очищена")}
function showPage(){const hash=location.hash.replace(/^#/,"");document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));if(hash.startsWith("metric/")){document.getElementById("metricPage").classList.add("active");renderMetric(decodeURIComponent(hash.split("/")[1]))}else if(hash==="history"){document.getElementById("historyPage").classList.add("active");renderHistory()}else{document.getElementById("inputPage").classList.add("active");renderInput()}}
document.getElementById("clearTodayBtn").onclick=clearToday;document.getElementById("fullResetBtn").onclick=fullReset;document.getElementById("exportCsvBtn").onclick=exportCSV;window.addEventListener("hashchange",showPage);showPage();
</script>
</body></html>
