<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Отчетность склада — демо</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--text:#172033;--muted:#667085;--line:#d9dee7;--blue:#1f4e78;--soft:#e8eef5;--shadow:0 10px 24px rgba(16,24,40,.08);--radius:18px}
*{box-sizing:border-box}html,body{max-width:100%;overflow-x:hidden}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:20;background:#172033;color:white;padding:14px 18px;box-shadow:0 4px 18px rgba(0,0,0,.14)}
.topbar{max-width:1700px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
h1{font-size:20px;margin:0}.status{font-size:13px;color:#d0d5dd}.date-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:8px 12px;border-radius:999px;font-weight:800}
main{max-width:1700px;margin:18px auto 40px;padding:0 14px}.page{display:none}.page.active{display:block}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
button,.btn{border:0;border-radius:12px;padding:10px 14px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:40px;font-size:15px}
button.light,.btn.light{background:#fff;color:var(--text);border:1px solid var(--line)}button.danger{background:#b42318}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}.flow{background:white;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.flow-head{background:#172033;color:white;padding:14px 16px;font-weight:900;font-size:18px;display:flex;justify-content:space-between;gap:10px}.flow-sub{font-size:12px;color:#d0d5dd;font-weight:700}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px}.mini{border:1px solid var(--line);border-radius:16px;background:#fbfcfe;overflow:hidden}.mini-head{padding:12px;background:var(--soft);font-weight:900;display:flex;justify-content:space-between}.mini-head small{color:var(--muted);font-weight:800}
.metric-row{display:grid;grid-template-columns:minmax(160px,1fr) 110px 34px;gap:8px;align-items:center;border-bottom:1px solid var(--line);padding:9px 8px}.metric-row:last-child{border-bottom:0}.metric-name{font-weight:850;color:var(--text);text-decoration:none;border-bottom:2px solid transparent}.metric-name:hover{border-bottom-color:var(--blue)}
.metric-input{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 8px;text-align:center;background:#fff;font-size:16px;font-weight:850}.metric-input:focus{outline:2px solid rgba(31,78,120,.25);border-color:var(--blue)}
.icon-delete{width:30px;height:30px;min-height:30px;padding:0;border-radius:999px;background:#fff;color:#b42318;border:1px solid #f0b8b2;font-size:18px}.mini-foot{padding:10px 12px;background:#fff;display:flex;justify-content:space-between;color:var(--muted);font-size:13px;font-weight:800}
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin:12px 0;overflow:hidden}.panel h2,.panel h3{margin:0 0 12px}.filters{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 0;align-items:end}.filter{display:flex;flex-direction:column;gap:4px;color:var(--muted);font-size:13px;font-weight:800}input[type=date]{border:1px solid var(--line);border-radius:10px;padding:9px 10px;background:#fff;color:var(--text);font-weight:700}
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:12px;margin:14px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px}.stat .label{color:var(--muted);font-size:13px;margin-bottom:8px}.stat .value{font-size:28px;font-weight:900}
.chart-wrap{position:relative;overflow:hidden}.chart-scroll{width:100%;max-width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;position:relative}canvas{display:block;width:100%;height:320px;border:1px solid var(--line);border-radius:14px;background:#fff}.chart-tooltip{position:absolute;display:none;background:#172033;color:white;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700;box-shadow:0 10px 24px rgba(0,0,0,.22);pointer-events:none;z-index:5;min-width:170px}.chart-tooltip .muted{color:#d0d5dd}.chart-tooltip.show{display:block}
.table-scroll{width:100%;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px}table{width:100%;min-width:760px;border-collapse:collapse;table-layout:fixed}th,td{border-bottom:1px solid var(--line);padding:8px 7px;text-align:left;font-size:14px}th{background:#f8fafc;color:#344054;font-size:12px;text-transform:uppercase}.badge{border-radius:999px;padding:7px 10px;font-size:13px;font-weight:800;border:1px solid var(--line);display:inline-flex}
.toast{position:fixed;left:50%;top:84px;transform:translateX(-50%);background:#172033;color:white;padding:14px 18px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:9999;font-weight:800;max-width:92%;text-align:center;display:none}.toast.show{display:block}
.modal-backdrop{position:fixed;inset:0;background:rgba(23,32,51,.58);display:none;align-items:center;justify-content:center;z-index:10000;padding:16px}.modal-backdrop.show{display:flex}.modal{background:white;border-radius:20px;box-shadow:0 24px 70px rgba(0,0,0,.28);width:100%;max-width:420px;padding:20px;border:1px solid var(--line)}.modal h3{margin:0 0 8px}.modal p{margin:0 0 14px;color:var(--muted);font-size:14px}.modal input{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin:6px 0 10px;font-weight:800;font-size:15px}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
@media(max-width:1200px){.layout{grid-template-columns:1fr}.mini-grid{grid-template-columns:1fr 1fr}}
@media(max-width:760px){main{padding:0 8px;margin-top:10px}header{position:static;padding:12px 10px}h1{font-size:17px}.status{width:100%;font-size:12px}.date-pill{font-size:13px}.actions{gap:8px}.btn,button{font-size:14px;padding:9px 11px}.mini-grid,.stats-grid{grid-template-columns:1fr}.metric-row{grid-template-columns:minmax(130px,1fr) 96px 32px;gap:6px}.metric-input{font-size:15px;padding:8px 6px}.flow-head{font-size:16px}.panel{padding:12px}.chart-scroll canvas{height:260px;min-width:760px}.filters{align-items:stretch}.filter{width:100%}input[type=date]{width:100%}}
</style>
</head>
<body>
<header><div class="topbar"><h1>Отчетность склада</h1><div class="status">Демо-макет с заполненными данными</div><div class="date-pill" id="todayLabel">Дата</div></div></header>
<div id="toast" class="toast"></div>
<main>
<section id="home" class="page active"><div class="actions"><a class="btn" href="#history">История</a><a class="btn light" href="#metric/assembly_done">Пример аналитики</a><button class="danger" id="clearToday">Очистить сегодняшний день</button><button class="light" id="exportCsv">Скачать CSV</button></div><div id="root" class="layout"></div></section>
<section id="metric" class="page"><div class="actions"><a class="btn light" href="#">← Назад к вводу</a><a class="btn light" href="#history">История</a></div><div id="metricBox"></div></section>
<section id="history" class="page"><div class="actions"><a class="btn light" href="#">← Назад к вводу</a><button class="danger" id="fullReset">Очистка общей истории</button></div><div id="historyBox"></div></section>
</main>
<div class="modal-backdrop" id="authModal"><div class="modal"><h3>Подтверждение доступа</h3><p>Введите логин и пароль для выполнения действия.</p><input id="authLogin" placeholder="Логин" inputmode="numeric"><input id="authPassword" placeholder="Пароль" inputmode="numeric" type="password"><div class="modal-actions"><button class="light" id="authCancel">Отмена</button><button id="authConfirm">Подтвердить</button></div></div></div>
<script>
const LOGIN="156783",PASS="156783",KEY="warehouse_report_demo_fixed_v1";
const STRUCTURE=[{title:"Исходящий поток",subtitle:"Сборка, сортировка и упаковка",minis:[{title:"Сборка/сортировка",metrics:[["assembly_done","Собрано, шт"],["sorting_done","Отсортировано, шт"],["assembly_errors","Ошибки сборки, шт"]]},{title:"Упаковка",metrics:[["packed_total","Упаковано, шт"],["packing_rework","Возврат на перепаковку, шт"],["packing_staff","Упаковщиц, чел"]]}]},{title:"Входящий поток",subtitle:"Приемка, раскладка и инвентаризация",minis:[{title:"Приемка/раскладка",metrics:[["received_pallets","Принято паллет"],["putaway_pallets","Разложено паллет"],["receiving_staff","Сотрудников, чел"]]},{title:"Инвентаризация",metrics:[["inventory_checked","Проверено ячеек"],["inventory_mismatch","Расхождения, шт"],["inventory_staff","Инвентаризаторов, чел"]]}]}];
const METRICS={};STRUCTURE.forEach(b=>b.minis.forEach(m=>m.metrics.forEach(x=>METRICS[x[0]]={id:x[0],name:x[1],mini:m.title,block:b.title})));
function pad(n){return String(n).padStart(2,"0")}function today(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function nice(k){const[y,m,d]=k.split("-");return `${d}.${m}.${y}`}function ago(n){const d=new Date();d.setDate(d.getDate()-n);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function diff(f,t){return Math.floor((new Date(t+"T00:00:00")-new Date(f+"T00:00:00"))/86400000)+1}function okPeriod(f,t){const days=diff(f,t);return f&&t&&f<=t&&days>=7&&days<=62}function defFrom(){return ago(29)}function defTo(){return today()}function info(t){const e=document.getElementById("toast");e.textContent=t;e.classList.add("show");clearTimeout(window.tt);window.tt=setTimeout(()=>e.classList.remove("show"),3000)}
function seed(){const ids=Object.keys(METRICS),bases=[5200,4800,45,5100,130,53,270,245,18,940,21,5],data={};for(let i=29;i>=0;i--){const d=ago(i);data[d]={};ids.forEach((id,idx)=>{let base=bases[idx]||100;data[d][id]=Math.max(0,Math.round(base+(Math.sin(i+idx)*base*.08)+(Math.random()*base*.04)))})}return data}
function load(){try{const d=JSON.parse(localStorage.getItem(KEY));if(d&&Object.keys(d).length)return d}catch(e){}const d=seed();save(d);return d}function save(d){localStorage.setItem(KEY,JSON.stringify(d))}function rows(f=ago(61),t=today(),id=null){const d=load(),out=[];Object.keys(d).sort().forEach(date=>{if(date<f||date>t)return;Object.keys(d[date]).forEach(k=>{if(id&&k!==id)return;const m=METRICS[k];if(m)out.push({date,id:k,value:Number(d[date][k]),...m})})});return out}
function renderHome(){document.getElementById("todayLabel").textContent="Сегодня: "+nice(today());const d=load(),date=today(),root=document.getElementById("root");root.innerHTML="";STRUCTURE.forEach(block=>{const flow=document.createElement("article");flow.className="flow";flow.innerHTML=`<div class="flow-head"><div>${block.title}</div><div class="flow-sub">${block.subtitle}</div></div><div class="mini-grid"></div>`;const grid=flow.querySelector(".mini-grid");block.minis.forEach(mini=>{const box=document.createElement("section");box.className="mini";box.innerHTML=`<div class="mini-head"><span>${mini.title}</span><small>${mini.metrics.length} показателя</small></div><div></div><div class="mini-foot"><span>Данные за сегодня</span><span>${nice(date)}</span></div>`;const list=box.children[1];mini.metrics.forEach(([id,name])=>{list.insertAdjacentHTML("beforeend",`<div class="metric-row"><a class="metric-name" href="#metric/${id}">${name}</a><input class="metric-input" inputmode="numeric" value="${d[date]?.[id]??""}" data-id="${id}"><button class="icon-delete" data-del="${id}">×</button></div>`)});grid.appendChild(box)});root.appendChild(flow)});bindInputs()}
function bindInputs(){document.querySelectorAll(".metric-input").forEach(i=>{i.oninput=e=>e.target.value=e.target.value.replace(/[^\d.]/g,"");i.onblur=e=>{const data=load();data[today()]||={};if(e.target.value==="")delete data[today()][e.target.dataset.id];else data[today()][e.target.dataset.id]=Number(e.target.value);save(data);info("Сохранено")};i.onkeydown=e=>{if(e.key==="Enter")e.target.blur()}});document.querySelectorAll("[data-del]").forEach(b=>b.onclick=e=>{if(!confirm("Удалить значение за сегодня?"))return;const data=load();if(data[today()])delete data[today()][e.target.dataset.del];save(data);renderHome();info("Удалено")})}
function stats(r){const c=r.length,s=r.reduce((a,b)=>a+b.value,0),avg=c?s/c:0,max=c?Math.max(...r.map(x=>x.value)):0;return{c,s,avg,max}}function series(r){const m={};r.forEach(x=>{m[x.date]||=[];m[x.date].push(x.value)});return Object.keys(m).sort().map(date=>({date,value:m[date].reduce((a,b)=>a+b,0),count:m[date].length}))}
function controls(p,f,t){return `<div class="filters"><label class="filter">С даты<input type="date" id="${p}F" min="${ago(61)}" max="${today()}" value="${f}"></label><label class="filter">По дату<input type="date" id="${p}T" min="${ago(61)}" max="${today()}" value="${t}"></label><button class="light" id="${p}B">Показать</button></div>`}function bindPeriod(p,cb){document.getElementById(p+"B").onclick=()=>{const f=document.getElementById(p+"F").value,t=document.getElementById(p+"T").value;if(!okPeriod(f,t)){info("Выберите период более 7 дней, но не более 62 дней");return}cb(f,t)}}
function cards(s){return `<div class="stats-grid"><div class="stat"><div class="label">Дней</div><div class="value">${s.c}</div></div><div class="stat"><div class="label">Сумма</div><div class="value">${Math.round(s.s)}</div></div><div class="stat"><div class="label">Среднее</div><div class="value">${Math.round(s.avg)}</div></div><div class="stat"><div class="label">Максимум</div><div class="value">${Math.round(s.max)}</div></div></div>`}
function table(r){return `<div class="table-scroll"><table><thead><tr><th>Дата</th><th>Блок</th><th>Миниблок</th><th>Показатель</th><th>Значение</th></tr></thead><tbody>${r.slice().reverse().map(x=>`<tr><td>${nice(x.date)}</td><td>${x.block}</td><td>${x.mini}</td><td>${x.name}</td><td><b>${x.value}</b></td></tr>`).join("")||"<tr><td colspan=5>Нет данных</td></tr>"}</tbody></table></div>`}
function draw(canvas,pts,title){const ctx=canvas.getContext("2d"),ratio=devicePixelRatio||1;canvas.width=canvas.clientWidth*ratio;canvas.height=canvas.clientHeight*ratio;ctx.scale(ratio,ratio);const W=canvas.clientWidth,H=canvas.clientHeight;ctx.clearRect(0,0,W,H);ctx.font="14px system-ui";ctx.fillStyle="#172033";ctx.fillText(title,18,26);const tip=canvas.parentElement.querySelector(".chart-tooltip");canvas.pts=[];if(!pts.length)return;const L=54,R=18,T=44,B=54,PW=W-L-R,PH=H-T-B,maxY=Math.max(10,Math.ceil(Math.max(...pts.map(p=>p.value))/10)*10);ctx.strokeStyle="#d9dee7";for(let i=0;i<=4;i++){let y=T+PH/4*i;ctx.beginPath();ctx.moveTo(L,y);ctx.lineTo(W-R,y);ctx.stroke();ctx.fillStyle="#667085";ctx.font="12px system-ui";ctx.fillText(String(Math.round(maxY-maxY/4*i)),14,y+4)}const x=i=>pts.length===1?L+PW/2:L+PW/(pts.length-1)*i,y=v=>T+PH-(v/maxY)*PH;ctx.strokeStyle="#1f4e78";ctx.lineWidth=3;ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(x(i),y(p.value)):ctx.moveTo(x(i),y(p.value)));ctx.stroke();ctx.fillStyle="#1f4e78";pts.forEach((p,i)=>{canvas.pts.push({x:x(i),y:y(p.value),...p});ctx.beginPath();ctx.arc(x(i),y(p.value),4,0,Math.PI*2);ctx.fill()});ctx.fillStyle="#667085";ctx.font="11px system-ui";let step=Math.max(1,Math.ceil(pts.length/8));pts.forEach((p,i)=>{if(i%step===0||i===pts.length-1){ctx.save();ctx.translate(x(i),H-18);ctx.rotate(-.35);ctx.fillText(nice(p.date).slice(0,5),-13,0);ctx.restore()}});const show=e=>{const rect=canvas.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY,mx=cx-rect.left,my=cy-rect.top;let near=null,best=999;canvas.pts.forEach(p=>{let d=Math.hypot(mx-p.x,my-p.y);if(d<best){best=d;near=p}});if(!near||best>22){tip.classList.remove("show");return}tip.innerHTML=`<div>${nice(near.date)}</div><div class="muted">Значение: ${near.value}</div>`;tip.style.left=Math.min(Math.max(near.x+12,8),rect.width-190)+"px";tip.style.top=Math.max(near.y-64,8)+"px";tip.classList.add("show")};canvas.onmousemove=show;canvas.ontouchstart=show;canvas.ontouchmove=show;canvas.onmouseleave=()=>tip.classList.remove("show")}
function renderMetric(id,f=defFrom(),t=defTo()){const m=METRICS[id],r=rows(f,t,id),s=stats(r);document.getElementById("metricBox").innerHTML=`<div class="panel"><h2>${m.name}</h2><span class="badge">${m.block} / ${m.mini}</span>${controls("m",f,t)}${cards(s)}</div><div class="panel chart-wrap"><div class="chart-scroll"><canvas id="chart"></canvas><div class="chart-tooltip"></div></div></div><div class="panel"><h3>История показателя</h3>${table(r)}</div>`;bindPeriod("m",(a,b)=>renderMetric(id,a,b));draw(document.getElementById("chart"),series(r),"Динамика: "+m.name)}
function renderHistory(f=defFrom(),t=defTo()){const r=rows(f,t);document.getElementById("historyBox").innerHTML=`<div class="panel"><h2>История отчетности</h2>${controls("h",f,t)}${table(r)}</div>`;bindPeriod("h",(a,b)=>renderHistory(a,b))}
function auth(){return new Promise(res=>{const m=document.getElementById("authModal"),l=document.getElementById("authLogin"),p=document.getElementById("authPassword");l.value="";p.value="";m.classList.add("show");l.focus();document.getElementById("authCancel").onclick=()=>{m.classList.remove("show");res(false)};document.getElementById("authConfirm").onclick=()=>{m.classList.remove("show");if(l.value===LOGIN&&p.value===PASS)res(true);else{info("Вы не имеете прав очищать историю");res(false)}}})}
document.getElementById("clearToday").onclick=async()=>{if(!await auth())return;if(!confirm("Очистить сегодняшний день?"))return;const d=load();delete d[today()];save(d);renderHome();info("Сегодня очищен")};document.getElementById("fullReset").onclick=async()=>{if(!await auth())return;if(!confirm("Удалить всю историю?"))return;save({});renderHistory();info("История очищена")};document.getElementById("exportCsv").onclick=()=>{const r=rows(ago(61),today()),head=["Дата","Блок","Миниблок","Показатель","Значение"],esc=v=>`"${String(v??"").replace(/"/g,'""')}"`,lines=[head.map(esc).join(";")];r.forEach(x=>lines.push([nice(x.date),x.block,x.mini,x.name,x.value].map(esc).join(";")));const blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="warehouse-report.csv";a.click();URL.revokeObjectURL(a.href)}
function show(){const h=location.hash.replace(/^#/,"");document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));if(h.startsWith("metric/")){document.getElementById("metric").classList.add("active");renderMetric(decodeURIComponent(h.split("/")[1]))}else if(h==="history"){document.getElementById("history").classList.add("active");renderHistory()}else{document.getElementById("home").classList.add("active");renderHome()}}window.addEventListener("hashchange",show);show();
</script>
</body></html>
